<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz para programadores</title>
    <link rel="stylesheet" href="./styles/styleContato.css">
</head>
<body>
    <header class="cabecalho">
        <h1 class="titulo">Quiz interativo para programadores</h1>
        <p>Teste seus conhecimentos em programação e veja qual pontuação você consegue fazer!</p>
        <div class="cabecalho-menu">
            <a href="index.html">
                <img src="./img/quiz.png" alt="Logodoquiz" class="cabecalho-menu-img">
            </a>
            <nav class="menu">
                <a href="pontuacao.html">Pontuação</a>
                <a href="respostas.html">Respostas</a>
                <a href="contato.html">Contato</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <h2 class="subtitulo">Nos dê o seu feedback</h2>
        <form>
            <fieldset>
                <legend>Informações de Contato</legend>

                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Digite o seu nome" required>

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="exemplo@.com.br" required><br>

                <label for="comentario">Comentário</label>
                <textarea name="comentario" id="comentario" placeholder="Digite o seu comentário..." cols="60" rows="10"></textarea><br>

                <button type="submit">Concluído</button>
            </fieldset>
        </form>
        <button onclick="alert('Quiz enviado!')">Enviar Quiz</button>
    </main>
    <footer class="rodape">
        <p>
            &copy Quiz de programação. Todos os direitos reservado.
        </p>
        <p>
            Para conhecer mais sobre mim <a href="https://marinaruiz-hub.github.io/portfolio/" class="footer-link" target="_blank">clique aqui</a> 
        </p>
    </footer>
</body>
</html>
